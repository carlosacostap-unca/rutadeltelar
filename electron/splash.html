<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cargando Ruta del Telar</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        display: grid;
        place-items: center;
        background: #082d49;
        color: #f8e8cf;
        font-family: "Segoe UI", Arial, sans-serif;
        user-select: none;
      }
      main {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 42px 50px 38px;
        border: 2px solid rgba(239, 212, 176, .42);
        background:
          radial-gradient(circle at 50% 22%, rgba(41, 104, 139, .62), transparent 42%),
          linear-gradient(145deg, #123a55, #082d49);
      }
      img { width: 154px; height: 154px; filter: drop-shadow(0 12px 28px rgba(0,0,0,.28)); }
      h1 { margin: 22px 0 5px; font-size: 29px; letter-spacing: .03em; }
      .subtitle { margin: 0; color: #efd4b0; font-size: 13px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }
      .progress { width: 100%; height: 7px; margin: 38px 0 20px; overflow: hidden; border-radius: 99px; background: rgba(239,212,176,.18); }
      .progress::after {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #d39a70, #efd4b0, #ffffff);
        animation: loading 1.25s ease-in-out infinite;
      }
      #status { min-height: 22px; margin: 0; font-size: 15px; font-weight: 650; text-align: center; }
      .hint { margin: 10px 0 0; color: rgba(248,232,207,.68); font-size: 12px; text-align: center; }
      @keyframes loading { from { transform: translateX(-110%); } to { transform: translateX(250%); } }
    </style>
  </head>
  <body>
    <main>
      <img src="assets/app-icon.png" alt="Vicuña de Ruta del Telar" />
      <h1>Ruta del Telar</h1>
      <p class="subtitle">Experiencia de exposición</p>
      <div class="progress" aria-hidden="true"></div>
      <p id="status" role="status">Preparando la aplicación…</p>
      <p class="hint">Esto puede demorar unos instantes.</p>
    </main>
    <script>
      window.setStartupStatus = (message) => {
        document.getElementById("status").textContent = message;
      };
    </script>
  </body>
</html>
